<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matthew Ho — Senior Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f0e8;
      --bg-alt:     #ede8df;
      --bg-card:    #e9e3d9;
      --ink:        #1c1a17;
      --ink-mid:    #5a554e;
      --ink-light:  rgba(28,26,23,0.35);
      --border:     rgba(28,26,23,0.11);
      --orange:     #c94a12;
      --orange-dim: rgba(201,74,18,0.1);
      --display:    'Noto Serif', Georgia, serif;
      --cursive:    'Caprasimo', cursive;
      --body:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* subtle paper texture */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 600;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 3rem;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--cursive);
      font-size: 1.5rem; font-weight: 700;
      color: var(--ink); text-decoration: none;
      letter-spacing: 0.01em;
      opacity: 0; animation: fadeDown 0.6s 0.1s ease forwards;
    }
    .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
    .nav-links li { opacity: 0; animation: fadeDown 0.6s ease forwards; }
    .nav-links li:nth-child(1) { animation-delay: 0.15s; }
    .nav-links li:nth-child(2) { animation-delay: 0.22s; }
    .nav-links li:nth-child(3) { animation-delay: 0.29s; }
    .nav-links a {
      font-family: var(--body); font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-mid); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--orange); }
    .nav-links .linkedin-icon svg { width: 15px; height: 15px; fill: var(--ink-mid); transition: fill 0.2s; display: block; }
    .nav-links .linkedin-icon:hover svg { fill: var(--orange); }

    /* ── Intro banner ── */
    .intro-banner {
      position: relative; z-index: 1;
      padding: 8rem 3rem 0;
      max-width: 900px; margin: 0 auto;
      text-align: center;
      opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards;
    }
    .intro-banner p {
      font-family: var(--display);
      /* Start large; JS will shrink if it wraps beyond 2 lines */
      font-size: 4vw;   /* JS fitIntro() enforces 2-line max */
      letter-spacing: 0.03em;
      line-height: 1.08;
      color: var(--ink);
    }
    .intro-banner p em {
      font-style: normal;
      color: var(--orange);
    }
    /* thin rule below */
    .intro-banner::after {
      content: '';
      display: block; width: 48px; height: 2px;
      background: var(--orange);
      margin: 2.5rem auto 0;
    }

    /* ── Main two-col ── */
    .home-main {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      max-width: 1200px; margin: 0 auto;
      padding: 0 3rem 5rem;
      align-items: start;
    }

    /* ── LEFT: photo + bio ── */
    .bio-col {
      padding: 3.5rem 4rem 3rem 0;
      border-right: 1px solid var(--border);
      opacity: 0; animation: fadeUp 0.8s 0.5s ease forwards;
    }

    /* photo */
    .bio-photo {
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      border-radius: 3px;
      margin-bottom: 2.5rem;
      background: var(--bg-card);
    }
    .bio-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: saturate(0.9) contrast(1.02);
    }

    .bio-eyebrow {
      font-family: var(--mono); font-size: 0.62rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--orange);
      margin-bottom: 1.5rem;
    }

    .bio-text p {
      font-family: var(--body); font-size: 1rem; font-weight: 300;
      line-height: 1.9; color: var(--ink-mid);
    }
    .bio-text p + p { margin-top: 1.25rem; }

    .bio-cta {
      display: inline-flex; align-items: center; gap: 0.8rem;
      margin-top: 2.5rem;
      font-family: var(--body); font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink); text-decoration: none;
      border-bottom: 1.5px solid var(--orange); padding-bottom: 3px;
      transition: color 0.2s;
    }
    .bio-cta:hover { color: var(--orange); }

    /* ── RIGHT: sidebar ── */
    .sidebar-col {
      padding: 3.5rem 0 3rem 3rem;
      opacity: 0; animation: fadeUp 0.8s 0.65s ease forwards;
    }

    .sidebar-section { margin-bottom: 2.75rem; }
    .sidebar-label {
      font-family: var(--mono); font-size: 0.6rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange);
      margin-bottom: 1rem; padding-bottom: 0.55rem;
      border-bottom: 1px solid rgba(201,74,18,0.22);
    }

    /* TL;DR stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem 1rem; }
    .stat-num {
      font-family: var(--display); font-size: 2.5rem; font-weight: 700; letter-spacing: 0.01em;
      color: var(--ink); line-height: 1;
    }
    .stat-label {
      font-family: var(--body); font-size: 0.7rem; color: var(--ink-mid); margin-top: 0.15rem;
    }

    /* Experience */
    .exp-list { list-style: none; }
    .exp-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.1rem;
    }
    .exp-item:last-child { border-bottom: none; }
    .exp-company { font-family: var(--body); font-size: 0.82rem; font-weight: 500; color: var(--ink); }
    .exp-role    { font-family: var(--body); font-size: 0.7rem; color: var(--ink-mid); }
    .exp-year    { font-family: var(--mono); font-size: 0.6rem; color: var(--ink-light); letter-spacing: 0.06em; }

    /* Awards */
    .awards-list { list-style: none; }
    .award-item {
      display: grid; grid-template-columns: 64px 1fr;
      gap: 0.4rem 0.65rem; align-items: start;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
    }
    .award-item:last-child { border-bottom: none; }
    .award-medal {
      font-family: var(--mono); font-size: 0.52rem; font-weight: 400;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #fff; background: #c9a84c;
      padding: 3px 0; border-radius: 2px;
      text-align: center; width: 64px; display: block; margin-top: 2px;
    }
    .award-medal.silver   { background: #8a96a6; }
    .award-medal.bronze   { background: #9a7048; }
    .award-medal.graphite { background: #6b7280; }
    .award-medal.shortlist,
    .award-medal.merit,
    .award-medal.finalist {
      background: transparent; color: var(--ink-mid);
      border: 1px solid var(--border); padding: 2px 0;
    }
    .award-detail { font-family: var(--body); font-size: 0.68rem; color: var(--ink-mid); line-height: 1.4; }
    .award-show   { font-size: 0.6rem; color: var(--ink-light); display: block; margin-top: 0.1rem; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.75rem 3rem;
      border-top: 1px solid var(--border);
      gap: 1rem; flex-wrap: wrap;
      background: var(--bg-alt);
    }
    footer a { font-family: var(--body); font-size: 0.8rem; color: var(--orange); text-decoration: none; font-weight: 400; }
    footer a:hover { text-decoration: underline; }
    footer p { font-family: var(--mono); font-size: 0.62rem; color: var(--ink-light); letter-spacing: 0.08em; }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      nav { padding: 1.25rem 1.5rem; }
      .intro-banner { padding: 7rem 1.5rem 0; }
      .home-main { grid-template-columns: 1fr; padding: 0 1.5rem 4rem; }
      .bio-col { border-right: none; padding: 2.5rem 0 0; }
      .sidebar-col { padding: 2.5rem 0 2rem 0; border-top: 1px solid var(--border); }
      footer { padding: 1.5rem 1.5rem; }
    }
    @media (max-width: 480px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.5rem; }
      .intro-banner { padding: 6.5rem 1.25rem 0; }
      .home-main { padding: 0 1.25rem 3rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Matthew Ho</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li>
        <a href="https://www.linkedin.com/in/matthew-ho-4947016a/" target="_blank" rel="noopener" class="linkedin-icon" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>

  <!-- centred intro -->
  <div class="intro-banner">
    <p id="home-intro">Hi there! I help brands bring ideas to life <em>beyond a PDF.</em></p>
  </div>

  <div class="home-main">

    <!-- LEFT: photo + bio -->
    <section class="bio-col">
      <div class="bio-photo">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80"
             alt="Matthew Ho" id="bio-photo-img" />
      </div>
      <p class="bio-eyebrow" id="home-eyebrow">Senior Creative · Singapore</p>
      <div class="bio-text" id="home-bio"></div>
      <a class="bio-cta" href="work.html" id="home-cta">View my work →</a>
    </section>

    <!-- RIGHT: sidebar -->
    <aside class="sidebar-col">

      <div class="sidebar-section">
        <p class="sidebar-label">TL;DR</p>
        <div class="stats-grid">
          <div>
            <div class="stat-num">9+</div>
            <div class="stat-label">Years</div>
          </div>
          <div>
            <div class="stat-num">35+</div>
            <div class="stat-label">Awards</div>
          </div>
          <div>
            <div class="stat-num">12+</div>
            <div class="stat-label">Global brands</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Experience</p>
        <ul class="exp-list" id="exp-list"></ul>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Awards</p>
        <ul class="awards-list" id="awards-list"></ul>
      </div>

    </aside>
  </div>

  <footer>
    <a href="mailto:matthewhzm@gmail.com">matthewhzm@gmail.com</a>
    <p>© <span id="footer-year"></span> Matthew Ho</p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Keep intro text to max 2 lines by shrinking font until lineCount ≤ 2
    function fitIntro() {
      const el = document.querySelector('.intro-banner p');
      if (!el) return;
      let size = parseFloat(getComputedStyle(el).fontSize);
      const lh = parseFloat(getComputedStyle(el).lineHeight) || size * 1.1;
      // shrink until height ≤ 2 line-heights
      while (el.scrollHeight > lh * 2.2 && size > 16) {
        size -= 0.5;
        el.style.fontSize = size + 'px';
      }
    }
    window.addEventListener('load', fitIntro);
    window.addEventListener('resize', fitIntro);

    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function loadHome() {
      let c;
      try { c = await (await fetch('content.json')).json(); } catch { return; }

      if (c.eyebrow) document.getElementById('home-eyebrow').textContent = c.eyebrow;
      if (c.photo)   document.getElementById('bio-photo-img').src = c.photo;

      if (c.bio?.length)
        document.getElementById('home-bio').innerHTML = c.bio.map(p => `<p>${esc(p)}</p>`).join('');

      if (c.cta) {
        const el = document.getElementById('home-cta');
        el.textContent = (c.cta.label || 'View my work') + ' →';
        el.href = c.cta.url || 'work.html';
      }

      if (c.experience?.length)
        document.getElementById('exp-list').innerHTML =
          c.experience.map(e => `
            <li class="exp-item">
              <span class="exp-company">${esc(e.company)}</span>
              <span class="exp-role">${esc(e.role)}</span>
              <span class="exp-year">${esc(e.year)}</span>
            </li>`).join('');

      if (c.awards?.length)
        document.getElementById('awards-list').innerHTML =
          c.awards.map(a => `
            <li class="award-item">
              <span class="award-medal ${esc(a.type)}">${esc(a.medal)}</span>
              <span class="award-detail">${esc(a.show)}<span class="award-show">${esc(a.detail)}</span></span>
            </li>`).join('');
    }

    loadHome();
  </script>
</body>
</html>
