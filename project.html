<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Matthew Ho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #f5f0e8;
      --bg-alt:     #ede8df;
      --bg-card:    #e9e3d9;
      --ink:        #1c1a17;
      --ink-mid:    #5a554e;
      --ink-light:  rgba(28,26,23,0.35);
      --border:     rgba(28,26,23,0.11);
      --orange:     #c94a12;
      --display:    'Noto Serif', Georgia, serif;
      --cursive:    'Caprasimo', cursive;
      --body:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: var(--body); font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Nav — always visible on light bg ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 600;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 3rem;
      background: rgba(245,240,232,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--cursive); font-size: 1.4rem; color: var(--ink); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--body); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mid); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--orange); }
    .nav-links .linkedin-icon svg { width: 15px; height: 15px; fill: var(--ink-mid); transition: fill 0.2s; display: block; }
    .nav-links .linkedin-icon:hover svg { fill: var(--orange); }

    /* ── Page root — rendered by JS ── */
    #page-root { position: relative; z-index: 1; }

    /* ── Project content wrapper ── */
    .proj-wrap {
      /* Adaptive: comfortable reading width, scales with viewport */
      max-width: min(860px, 90vw);
      width: 100%;
      margin: 0 auto;
      padding: 8rem 0 5rem;
      opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards;
    }

    /* ── 1. Title ── */
    .proj-title {
      font-family: var(--display);
      font-size: 6vw;   /* scales purely with viewport */
      font-weight: 700;
      letter-spacing: -0.01em; line-height: 1.0;
      color: var(--ink);
      margin-bottom: 1.75rem;
    }

    /* ── 2. Client / Agency / Year strip ── */
    .proj-meta {
      display: flex; gap: 2.5rem; flex-wrap: wrap;
      padding-bottom: 1.75rem; margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .meta-label { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--orange); }
    .meta-value { font-family: var(--body); font-size: 0.85rem; color: var(--ink); font-weight: 400; }

    /* ── 3. Tags + award ── */
    .proj-tags-row {
      display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2.5rem;
    }
    .proj-tag {
      font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-mid); border: 1px solid var(--border);
      padding: 3px 9px; border-radius: 2px;
    }
    .proj-award-badge {
      font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 2px;
    }
    .proj-award-badge.gold     { background: #c9a84c; color: #1c1a17; }
    .proj-award-badge.silver   { background: #8a96a6; color: #1c1a17; }
    .proj-award-badge.bronze   { background: #9a7048; color: #1c1a17; }
    .proj-award-badge.shortlist,
    .proj-award-badge.merit,
    .proj-award-badge.finalist { border: 1px solid var(--border); color: var(--ink-mid); }

    /* ── 4. Showcase (video or image) ── */
    .proj-showcase {
      width: 100%; margin-bottom: 3rem;
      border-radius: 4px; overflow: hidden;
      background: var(--bg-card);
    }
    .proj-showcase-ratio {
      position: relative; width: 100%; padding-top: 56.25%;
    }
    .proj-showcase-ratio iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .proj-showcase img {
      width: 100%; display: block;
      filter: saturate(0.92) contrast(1.01);
    }

    /* ── 5. Pull quote ── */
    .proj-pull {
      font-family: var(--display);
      font-style: italic;
      font-size: 2.8vw;
      font-weight: 400;
      letter-spacing: -0.01em; line-height: 1.25;
      color: var(--ink);
      padding: 0 0 0 1.5rem;
      border-left: 3px solid var(--orange);
      margin-bottom: 2.5rem;
    }

    /* ── 6. Body copy ── */
    .proj-body-copy { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 3rem; }
    .proj-para { font-family: var(--body); font-size: 1rem; font-weight: 300; line-height: 1.9; color: var(--ink-mid); }

    /* ── 7. Sections ── */
    .proj-sections { display: flex; flex-direction: column; gap: 2rem; margin-bottom: 3rem; }
    .proj-section {}
    .proj-section-heading {
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--orange); margin-bottom: 0.6rem;
    }
    .proj-section-body { font-family: var(--body); font-size: 0.95rem; font-weight: 300; line-height: 1.85; color: var(--ink-mid); }

    /* ── 8. Assets ── */
    .proj-assets { margin-bottom: 3rem; }
    .proj-assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 3px; }
    .asset-item { display: flex; flex-direction: column; gap: 0.4rem; }
    .asset-media { border-radius: 3px; overflow: hidden; background: var(--bg-card); }
    .asset-media img { width: 100%; display: block; transition: transform 0.4s ease; }
    .asset-item:hover .asset-media img { transform: scale(1.02); }
    .asset-vimeo-wrap { position: relative; padding-top: 56.25%; }
    .asset-vimeo-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .asset-cap { font-family: var(--mono); font-size: 0.6rem; color: var(--ink-light); letter-spacing: 0.06em; padding-left: 2px; }

    /* ── 9. Awards block ── */
    .proj-awards-block { border-top: 1px solid var(--border); padding-top: 1.75rem; margin-bottom: 3rem; }
    .proj-awards-heading { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange); margin-bottom: 0.85rem; }
    .proj-awards-block ul { list-style: none; }
    .proj-awards-block li {
      font-family: var(--body); font-size: 0.82rem; color: var(--ink-mid);
      padding: 0.45rem 0 0.45rem 1.1rem; border-bottom: 1px solid var(--border); position: relative;
    }
    .proj-awards-block li:last-child { border-bottom: none; }
    .proj-awards-block li::before { content: '—'; position: absolute; left: 0; color: var(--orange); font-size: 0.65rem; top: 0.6rem; }

    /* ── Project nav roll ── */
    .proj-nav-section {
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
    }
    .proj-nav-inner { max-width: min(860px, 90vw); margin: 0 auto; padding: 2rem 0; }
    .proj-nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .proj-nav-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange); }
    .proj-nav-arrows { display: flex; gap: 0.4rem; }
    .nav-arr {
      width: 30px; height: 30px; border-radius: 2px;
      border: 1px solid var(--border); background: none;
      color: var(--ink-mid); font-size: 0.75rem; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-arr:hover { background: var(--orange); border-color: var(--orange); color: #fff; }

    .proj-nav-track { position: relative; }
    .proj-nav-track::before, .proj-nav-track::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 2rem; z-index: 2; pointer-events: none;
    }
    .proj-nav-track::before { left: 0; background: linear-gradient(to right, var(--bg-alt), transparent); }
    .proj-nav-track::after  { right: 0; background: linear-gradient(to left, var(--bg-alt), transparent); }

    .proj-nav-scroll { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; padding: 0.25rem 0 0.5rem; scroll-behavior: smooth; }
    .proj-nav-scroll::-webkit-scrollbar { display: none; }

    .proj-nav-card {
      flex: 0 0 auto; min-width: 180px; max-width: 230px;
      text-decoration: none; color: inherit;
      padding: 0.85rem 1.1rem; border-radius: 3px;
      background: var(--bg); border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
      display: flex; flex-direction: column; gap: 0.2rem;
    }
    .proj-nav-card:hover { border-color: rgba(201,74,18,0.4); background: var(--bg-card); }
    .proj-nav-card.active { background: var(--orange); border-color: var(--orange); }
    .proj-nav-card.active .pnc-num, .proj-nav-card.active .pnc-brand { color: rgba(245,240,232,0.6); }
    .proj-nav-card.active .pnc-title { color: #f5f0e8; }

    .pnc-num   { font-family: var(--mono); font-size: 0.58rem; color: var(--ink-light); letter-spacing: 0.1em; }
    .pnc-title { font-family: var(--display); font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }
    .pnc-brand { font-family: var(--body); font-size: 0.6rem; color: var(--ink-mid); }

    /* ── Footer ── */
    footer { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 1.75rem 3rem; border-top: 1px solid var(--border); gap: 1rem; flex-wrap: wrap; background: var(--bg-alt); }
    footer a { font-family: var(--body); font-size: 0.8rem; color: var(--orange); text-decoration: none; font-weight: 400; }
    footer p { font-family: var(--mono); font-size: 0.62rem; color: var(--ink-light); letter-spacing: 0.08em; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 900px) {
      nav { padding: 1.25rem 1.5rem; }
      .proj-wrap { padding: 7rem 0 4rem; }
      .proj-nav-inner { padding: 2rem 0; }
      footer { padding: 1.5rem 1.5rem; }
    }
    @media (max-width: 480px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.5rem; }
      .proj-wrap { padding: 6.5rem 1.25rem 3rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Matthew Ho</a>
    <ul class="nav-links">
      <li><a href="index.html">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li>
        <a href="https://www.linkedin.com/in/matthew-ho-4947016a/" target="_blank" rel="noopener" class="linkedin-icon" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>

  <div id="page-root"></div>

  <footer>
    <a href="mailto:matthewhzm@gmail.com">matthewhzm@gmail.com</a>
    <p>© <span class="footer-year"></span> Matthew Ho</p>
  </footer>

  <script>
    document.querySelectorAll('.footer-year').forEach(el => el.textContent = new Date().getFullYear());

    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function vimeoEmbed(id) {
      return `<div class="proj-showcase-ratio"><iframe src="https://player.vimeo.com/video/${esc(id)}?autoplay=0" allow="fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>`;
    }

    function renderAsset(a) {
      if (a.type === 'vimeo') return `
        <div class="asset-item">
          <div class="asset-media"><div class="asset-vimeo-wrap"><iframe src="https://player.vimeo.com/video/${esc(a.vimeoId)}" allow="fullscreen" allowfullscreen loading="lazy"></iframe></div></div>
          ${a.caption ? `<span class="asset-cap">${esc(a.caption)}</span>` : ''}
        </div>`;
      return `
        <div class="asset-item">
          <div class="asset-media"><img src="${esc(a.url)}" alt="${esc(a.caption||'')}" loading="lazy" /></div>
          ${a.caption ? `<span class="asset-cap">${esc(a.caption)}</span>` : ''}
        </div>`;
    }

    async function init() {
      const root = document.getElementById('page-root');
      const id = new URLSearchParams(location.search).get('id');

      let projects;
      try { projects = await (await fetch('projects.json')).json(); }
      catch {
        root.innerHTML = `<div style="padding:8rem 3rem;text-align:center;"><p style="font-family:var(--body);color:var(--ink-mid);">Could not load projects. Run via a local server.</p></div>`;
        return;
      }

      const p = projects.find(x => x.id === id);
      if (!p) {
        root.innerHTML = `<div style="padding:8rem 3rem;text-align:center;">
          <h1 style="font-family:var(--display);font-size:4rem;color:var(--ink);">Not found.</h1>
          <a href="work.html" style="color:var(--orange);font-family:var(--body);font-size:0.8rem;text-decoration:none;display:inline-block;margin-top:1rem;">← Back to work</a>
        </div>`;
        return;
      }

      document.title = `${p.title} — Matthew Ho`;

      // meta
      const brandLine = [p.brand, p.agency].filter(Boolean).join(' · ');
      const tags = (p.tags||[]).map(t => `<span class="proj-tag">${esc(t)}</span>`).join('');
      const award = p.award ? `<span class="proj-award-badge ${esc(p.awardType)}">${esc(p.award)}</span>` : '';

      // meta strip items
      const metaItems = [];
      if (p.brand)         metaItems.push({label:'Client',  value: p.brand});
      if (p.agency)        metaItems.push({label:'Agency',  value: p.agency});
      if (p.intro?.year)   metaItems.push({label:'Year',    value: p.intro.year});
      const metaHTML = metaItems.map(m =>
        `<div class="meta-item"><span class="meta-label">${esc(m.label)}</span><span class="meta-value">${esc(m.value)}</span></div>`
      ).join('');

      // showcase
      const firstImg = (p.assets||[]).find(a => a.type === 'image');
      const heroImg  = p.hero?.image || firstImg?.url || '';
      let showcaseHTML = '';
      if (p.hero?.type === 'vimeo' && p.hero?.vimeoId && p.hero.vimeoId !== 'REPLACE_ME') {
        showcaseHTML = `<div class="proj-showcase">${vimeoEmbed(p.hero.vimeoId)}</div>`;
      } else if (heroImg) {
        showcaseHTML = `<div class="proj-showcase"><img src="${esc(heroImg)}" alt="${esc(p.title)}" /></div>`;
      }

      // body copy
      const bodyHTML = (p.intro?.body||[]).map(t => `<p class="proj-para">${esc(t)}</p>`).join('');
      const sectionsHTML = (p.sections||[]).map(s => `
        <div class="proj-section">
          <h3 class="proj-section-heading">${esc(s.heading)}</h3>
          <p class="proj-section-body">${esc(s.body)}</p>
        </div>`).join('');

      // assets
      const assetsHTML = (p.assets||[]).map(a => renderAsset(a)).join('');

      // awards block
      const awardsHTML = p.awards?.length ? `
        <div class="proj-awards-block">
          <h3 class="proj-awards-heading">Awards</h3>
          <ul>${p.awards.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>
        </div>` : '';

      // nav roll
      const navItems = projects.map((proj, i) => `
        <a class="proj-nav-card${proj.id===id?' active':''}" href="project.html?id=${esc(proj.id)}">
          <span class="pnc-num">${String(i+1).padStart(2,'0')}</span>
          <span class="pnc-title">${esc(proj.title)}</span>
          <span class="pnc-brand">${esc(proj.brand)}${proj.agency?' · '+esc(proj.agency):''}</span>
        </a>`).join('');

      const navHTML = `
        <div class="proj-nav-section">
          <div class="proj-nav-inner">
            <div class="proj-nav-top">
              <p class="proj-nav-label">More work</p>
              <div class="proj-nav-arrows">
                <button class="nav-arr" id="nav-prev">←</button>
                <button class="nav-arr" id="nav-next">→</button>
              </div>
            </div>
            <div class="proj-nav-track">
              <div class="proj-nav-scroll" id="proj-nav-scroll">${navItems}</div>
            </div>
          </div>
        </div>`;

      // Assemble: Title → Meta → Tags → Showcase → Pull → Body → Sections → Assets → Awards
      root.innerHTML = `
        <div class="proj-wrap">
          <h1 class="proj-title">${esc(p.title)}</h1>
          <div class="proj-meta">${metaHTML}</div>
          <div class="proj-tags-row">${tags}${award}</div>
          ${showcaseHTML}
          ${p.intro?.headline ? `<p class="proj-pull">${esc(p.intro.headline)}</p>` : ''}
          ${bodyHTML ? `<div class="proj-body-copy">${bodyHTML}</div>` : ''}
          ${sectionsHTML ? `<div class="proj-sections">${sectionsHTML}</div>` : ''}
          ${assetsHTML ? `<div class="proj-assets"><div class="proj-assets-grid">${assetsHTML}</div></div>` : ''}
          ${awardsHTML}
        </div>
        ${navHTML}`;

      // Wire nav arrows. Scroll active card into rail WITHOUT affecting page scroll.
      setTimeout(() => {
        const scroll = document.getElementById('proj-nav-scroll');
        const active = scroll?.querySelector('.proj-nav-card.active');
        if (scroll && active) {
          // Calculate offset relative to the scroll container, not the page
          const railLeft   = scroll.getBoundingClientRect().left;
          const cardLeft   = active.getBoundingClientRect().left;
          const cardCenter = cardLeft - railLeft + active.offsetWidth / 2;
          const railCenter = scroll.offsetWidth / 2;
          scroll.scrollLeft = cardCenter - railCenter;
        }
        document.getElementById('nav-prev')?.addEventListener('click', () => scroll?.scrollBy({left:-220,behavior:'smooth'}));
        document.getElementById('nav-next')?.addEventListener('click', () => scroll?.scrollBy({left:220,behavior:'smooth'}));
      }, 100);
    }

    init();
  </script>
</body>
</html>
