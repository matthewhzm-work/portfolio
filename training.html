<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrAIning — Matthew Ho</title>
  <!-- Not linked from nav — access directly via /training.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0a0f1e;
      --navy-mid:  #0f1730;
      --navy-card: #0d1526;
      --white:     #f5f3ee;
      --white-dim: rgba(245,243,238,0.5);
      --orange:    #e8622a;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --gap:       10px;
      /* masonry column widths — JS picks the right one */
      --col-w:     320px;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--navy); color: var(--white); font-family: var(--sans); font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.45;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* ─── Nav ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 3rem;
      background: linear-gradient(to bottom, rgba(10,15,30,0.97) 0%, rgba(10,15,30,0) 100%);
      backdrop-filter: blur(3px);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; letter-spacing: 0.05em; color: var(--white); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--sans); font-size: 0.8rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white-dim); text-decoration: none; transition: color 0.25s; }
    .nav-links a:hover { color: var(--white); }
    .nav-links .linkedin-icon svg { width: 16px; height: 16px; fill: var(--white-dim); transition: fill 0.25s; display: block; }
    .nav-links .linkedin-icon:hover svg { fill: var(--orange); }

    /* ─── Page header ─── */
    .page-header {
      position: relative; z-index: 1;
      padding: 8rem 3rem 3rem;
      max-width: 1600px; margin: 0 auto;
      opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards;
    }
    .page-eyebrow {
      font-family: var(--sans); font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange);
      margin-bottom: 0.75rem;
    }
    .page-title {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 300; line-height: 1.0;
    }
    /* The AI styling: Tr + AI highlighted + ning */
    .page-title .ai-mark {
      font-style: italic; color: var(--orange);
    }
    .page-desc {
      margin-top: 1rem;
      font-family: var(--sans); font-size: 0.85rem; font-weight: 300;
      color: var(--white-dim); line-height: 1.7; max-width: 480px;
    }

    /* ─── Masonry wall ─── */
    /*
      True CSS column masonry — no JS layout needed.
      column-count adapts to viewport. Items flow top-to-bottom
      per column and fill naturally by height, just like Pinterest.
      GIFs and images use auto height. Videos use aspect-ratio.
    */
    .wall-wrap {
      position: relative; z-index: 1;
      padding: 0 3rem 6rem;
      max-width: 1600px; margin: 0 auto;
    }

    .masonry {
      column-gap: var(--gap);
      /* desktop: ~5 columns */
      column-count: 5;
    }

    /* each item breaks across columns naturally */
    .tile {
      break-inside: avoid;
      margin-bottom: var(--gap);
      border-radius: 6px;
      overflow: hidden;
      background: var(--navy-card);
      position: relative;
      cursor: zoom-in;
    }

    /* images and GIFs: natural height */
    .tile img {
      width: 100%; display: block;
      border-radius: 6px;
      transition: transform 0.4s ease;
    }

    /* video tiles: preserve aspect ratio */
    .tile.tile-video {
      cursor: default;
    }
    .tile-video-inner {
      position: relative;
      width: 100%;
      /* default 16:9; overridden inline by JS for portrait/square */
      padding-top: 56.25%;
    }
    .tile-video-inner video,
    .tile-video-inner iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; border-radius: 6px;
      object-fit: cover;
    }

    /* hover lift */
    .tile:hover img { transform: scale(1.03); }
    .tile::after {
      content: '';
      position: absolute; inset: 0; border-radius: 6px;
      background: rgba(10,15,30,0);
      transition: background 0.3s;
      pointer-events: none;
    }
    .tile:hover::after { background: rgba(10,15,30,0.12); }

    /* optional caption on hover */
    .tile-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0.6rem 0.8rem;
      font-family: var(--sans); font-size: 0.68rem; font-weight: 300;
      color: var(--white); line-height: 1.4;
      background: linear-gradient(to top, rgba(10,15,30,0.85) 0%, transparent 100%);
      border-radius: 0 0 6px 6px;
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .tile:hover .tile-caption { opacity: 1; transform: translateY(0); }

    /* ─── Lightbox ─── */
    #lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(5,8,18,0.94); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 2rem;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img, #lightbox video {
      max-width: 90vw; max-height: 90vh;
      border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      object-fit: contain;
    }
    #lb-close {
      position: fixed; top: 1.5rem; right: 2rem;
      font-family: var(--sans); font-size: 0.75rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--white-dim); cursor: pointer;
      background: none; border: none;
      transition: color 0.2s;
    }
    #lb-close:hover { color: var(--white); }

    /* ─── Empty state ─── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 6rem 2rem;
      text-align: center;
      font-family: var(--serif); font-size: 1.3rem; font-style: italic;
      color: var(--white-dim);
    }
    .empty-state span {
      display: block; margin-top: 0.75rem;
      font-family: var(--sans); font-size: 0.75rem; font-style: normal;
      color: rgba(245,243,238,0.3); letter-spacing: 0.1em;
    }

    /* ─── Footer ─── */
    footer { position: relative; z-index: 1; text-align: center; padding: 3rem; border-top: 1px solid rgba(245,243,238,0.07); }
    footer a { font-family: var(--serif); font-size: 1rem; font-style: italic; color: var(--orange); text-decoration: none; }
    footer a:hover { opacity: 0.75; }
    footer p { margin-top: 1rem; font-size: 0.7rem; color: rgba(245,243,238,0.3); letter-spacing: 0.1em; }

    /* ─── Animations ─── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* ─── Responsive column counts ─── */
    @media (max-width: 1400px) { .masonry { column-count: 4; } }
    @media (max-width: 1050px) { .masonry { column-count: 3; } }
    @media (max-width: 720px)  {
      .masonry { column-count: 2; }
      .wall-wrap { padding: 0 1.5rem 4rem; }
      .page-header { padding: 7rem 1.5rem 2.5rem; }
      nav { padding: 1.25rem 1.5rem; }
    }
    @media (max-width: 420px)  {
      .masonry { column-count: 2; }
      .wall-wrap { padding: 0 0.75rem 3rem; }
      .page-header { padding: 6.5rem 1rem 2rem; }
      nav { padding: 1rem 1rem; }
      .nav-links { gap: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- NAV — no link to this page from nav intentionally -->
  <nav>
    <a href="index.html" class="nav-logo">Matthew Ho</a>
    <ul class="nav-links">
      <li><a href="index.html">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li>
        <a href="https://www.linkedin.com/in/matthew-ho-4947016a/" target="_blank" rel="noopener" class="linkedin-icon" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <p class="page-eyebrow">Image Archive</p>
    <h1 class="page-title">Tr<span class="ai-mark">AI</span>ning</h1>
    <p class="page-desc">A wall of images made with AI. Experiments, explorations, and things that surprised me along the way.</p>
  </header>

  <!-- MASONRY WALL — populated by JS from training.json -->
  <main class="wall-wrap">
    <div class="masonry" id="masonry-wall">
      <!-- tiles rendered by JS -->
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lb-close">✕ Close</button>
    <div id="lb-content"></div>
  </div>

  <footer>
    <a href="mailto:matthewhzm@gmail.com">matthewhzm@gmail.com</a>
    <p>© 2025 Matthew Ho · Singapore</p>
  </footer>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // All your images/GIFs/videos live in training.json (same folder).
    // Each entry:
    //   { "type": "image"|"gif"|"video", "src": "filename.jpg", "caption": "optional" }
    //   For video: optionally add "aspect": "16/9" | "9/16" | "4/3" | "1/1"
    //              Defaults to "16/9" if omitted.
    // ─────────────────────────────────────────────────────────────────────────

    const wall   = document.getElementById('masonry-wall');
    const lb     = document.getElementById('lightbox');
    const lbBody = document.getElementById('lb-content');

    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // aspect string "w/h" → padding-top %
    function aspectToPad(a) {
      const parts = String(a||'16/9').split('/');
      const w = parseFloat(parts[0]) || 16;
      const h = parseFloat(parts[1]) || 9;
      return ((h / w) * 100).toFixed(4) + '%';
    }

    // Build a tile element
    function makeTile(item) {
      const tile = document.createElement('div');

      if (item.type === 'video') {
        // ── Video tile ──────────────────────────────────────
        tile.className = 'tile tile-video';
        const inner = document.createElement('div');
        inner.className = 'tile-video-inner';
        inner.style.paddingTop = aspectToPad(item.aspect);

        const vid = document.createElement('video');
        vid.src = item.src;
        vid.autoplay = true;
        vid.muted = true;
        vid.loop = true;
        vid.playsInline = true;
        vid.controls = false;
        inner.appendChild(vid);
        tile.appendChild(inner);

      } else {
        // ── Image / GIF tile ────────────────────────────────
        tile.className = 'tile';
        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.caption || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        tile.appendChild(img);

        // lightbox on click
        tile.addEventListener('click', () => openLightbox(item));
      }

      // optional caption overlay
      if (item.caption) {
        const cap = document.createElement('div');
        cap.className = 'tile-caption';
        cap.textContent = item.caption;
        tile.appendChild(cap);
      }

      // staggered fade-in
      tile.style.opacity = '0';
      tile.style.animation = 'fadeUp 0.5s ease forwards';

      return tile;
    }

    // Lightbox
    function openLightbox(item) {
      lbBody.innerHTML = '';
      if (item.type === 'gif' || item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.caption || '';
        lbBody.appendChild(img);
      }
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      lbBody.innerHTML = '';
      document.body.style.overflow = '';
    }

    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // Load items from training.json
    async function loadWall() {
      let items = [];
      try {
        const res = await fetch('training.json');
        if (!res.ok) throw new Error();
        items = await res.json();
      } catch {
        // training.json not found or empty — show placeholder wall
        items = [];
      }

      if (!items.length) {
        wall.innerHTML = `
          <div class="empty-state">
            Nothing here yet.
            <span>Add entries to training.json to populate this wall.</span>
          </div>`;
        return;
      }

      items.forEach((item, i) => {
        const tile = makeTile(item);
        tile.style.animationDelay = `${Math.min(i * 0.04, 0.6)}s`;
        wall.appendChild(tile);
      });
    }

    loadWall();
  </script>
</body>
